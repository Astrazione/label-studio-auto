services:
  db:
    image: pgautoupgrade/pgautoupgrade:17-alpine
    container_name: label-studio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: labelstudio
      POSTGRES_USER: labelstudio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labelstudio -d labelstudio"]
      interval: 10s
      timeout: 5s
      retries: 10
  
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./label-studio-data:/label-studio/data
    environment:
      LABEL_STUDIO_HOST: ${LABEL_STUDIO_HOST}
      CSRF_TRUSTED_ORIGINS: ${LABEL_STUDIO_HOST}

      DJANGO_DB: default
      POSTGRE_NAME: labelstudio
      POSTGRE_USER: labelstudio
      POSTGRE_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRE_PORT: 5432
      POSTGRE_HOST: db

      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/data

      LABEL_STUDIO_USERNAME: ${LABEL_STUDIO_USERNAME}
      LABEL_STUDIO_PASSWORD: ${LABEL_STUDIO_PASSWORD}
      LABEL_STUDIO_USER_TOKEN: ${LABEL_STUDIO_USER_TOKEN}
      LABEL_STUDIO_ENABLE_LEGACY_API_TOKEN: "true"

      LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK: "true"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  ml-backend:
    build: ./ml-backend
    container_name: ml-backend
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./ml-backend/weights:/app/weights
    environment:
      CONFIG_PATH: /app/config.yaml
      LABEL_STUDIO_URL: http://label-studio:8080
      LABEL_STUDIO_API_KEY: ${LABEL_STUDIO_USER_TOKEN}
    depends_on:
      - label-studio